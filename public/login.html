<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <section class="auth-card card">
    <h2>Admin Portal Login</h2>
    <p class="small">Use the admin credentials to manage features, orders, and clients.</p>

    <form id="loginForm">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="loginStatus" class="notice small" style="display:none;"></p>
  </section>

  <script>
    const form = document.getElementById('loginForm');
    const status = document.getElementById('loginStatus');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.style.display = 'none';

      const data = Object.fromEntries(new FormData(form).entries());
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });

      const payload = await res.json();
      if (res.ok) {
        window.location.href = '/admin';
        return;
      }

      status.style.display = 'block';
      status.className = 'notice small error';
      status.textContent = payload.message || 'Login failed';
    });
  </script>
</body>
</html>
